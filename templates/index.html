<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Explorer | Random Country Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap');

        /* Clean Reset */
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: "Bebas Neue", sans-serif;
            background: #000;
        }

        /* Background Layer */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('https://blackboxanalog.com/wp-content/uploads/2014/10/black-floral-texture-pattern-design-wallpaper-background.jpg');
            background-position: center;
            background-size: cover;
            filter: brightness(0.4);
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            color: #fff;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
            letter-spacing: 4px;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 40%, #4e73df);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Result Container */
        #dis {
            min-height: 120px;
            margin-bottom: 40px;
            color: #fff;
            font-size: 2.2rem;
            font-family: 'Inter', sans-serif; /* Cleaner font for the result */
            text-transform: uppercase;
            padding: 20px 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px border rgba(255,255,255,0.1);
            transition: all 0.5s ease;
        }

        .country-name {
            color: #68C784;
            font-weight: 700;
            display: block;
            font-size: 3.5rem;
            font-family: 'Bebas Neue';
            animation: slideUp 0.4s ease-out;
        }

        sup {
            font-size: 1rem;
            margin-left: 10px;
            color: #da4d11;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* UIVERSE BUTTON REFINED */
        .uiverse {
            --duration: 7s;
            --easing: linear;
            --c-color-1: rgba(255, 163, 26, 0.7);
            --c-color-2: #1a23ff;
            --c-color-3: #e21bda;
            --c-color-4: rgba(255, 232, 26, 0.7);
            --c-shadow: rgba(255, 223, 87, 0.5);
            --c-shadow-inset-top: rgba(255, 223, 52, 0.9);
            --c-shadow-inset-bottom: rgba(255, 250, 215, 0.8);
            --c-radial-inner: #ffd215;
            --c-radial-outer: #fff172;
            --c-color: #000;
            
            position: relative;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            padding: 0;
            transition: transform 0.2s;
            box-shadow: 0 0 25px var(--c-shadow);
        }

        .uiverse:hover {
            transform: scale(1.05);
            --duration: 1.5s;
        }

        .uiverse:active {
            transform: scale(0.95);
        }

        .uiverse .wrapper {
            overflow: hidden;
            border-radius: 50px;
            min-width: 200px;
            padding: 18px 30px;
            background: radial-gradient(circle, var(--c-radial-inner), var(--c-radial-outer) 80%);
            position: relative;
        }

        .uiverse span {
            position: relative;
            z-index: 10;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 1.2rem;
        }

        /* Circles */
        .circle {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            filter: blur(10px);
            animation: var(--animation) var(--duration) var(--easing) infinite;
        }

        .circle-1 { --background: var(--c-color-4); --animation: circle-1; top: -20px; left: 10px; }
        .circle-2 { --background: var(--c-color-1); --animation: circle-2; bottom: -20px; right: 10px; }
        /* ... Added simplified animations below for brevity, keep your original ones for the complexity ... */

        @keyframes circle-1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(100px, 20px); } }
        @keyframes circle-2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-100px, -20px); } }

    </style>
</head>

<body>
    <div class="bg-overlay"></div>
    
    <h1>COUNTRY GENERATOR</h1>

    <div id="dis">Press Generate to start</div>

    <button id="btn" onclick="get_country()" class="uiverse">
        <div class="wrapper">
            <span>GENERATE</span>
            <div class="circle circle-1" style="background: var(--c-color-1)"></div>
            <div class="circle circle-2" style="background: var(--c-color-2)"></div>
        </div>
    </button>

    <script>
        function get_country() {
            const display = document.getElementById('dis');
            display.style.opacity = "0.5"; // Visual feedback while loading
            
            fetch("https://country-api-h2xe.onrender.com/api/countries")
                .then(res => res.json())
                .then(con => {
                    display.style.opacity = "1";
                    display.innerHTML = `
                        <div style="font-size: 0.8rem; letter-spacing: 2px; color: #aaa;">Your Destination:</div>
                        <span class="country-name">${con.countries}<sup>${con.short}</sup></span>
                    `;
                })
                .catch(err => {
                    display.innerHTML = "Connection Error";
                    display.style.opacity = "1";
                });
        }
    </script>
</body>
</html>
